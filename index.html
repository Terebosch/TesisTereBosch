                  const searchBox = document.getElementById("searchBox");
const clearBtn = document.getElementById("clearBtn");
const suggestions = document.getElementById("suggestions");

function focusNode(id) {
  network.selectNodes([id]);
  network.focus(id, {
    scale: 1.6,
    animation: {
      duration: 800,
      easingFunction: "easeInOutQuad"
    }
  });
}

function showSuggestions(query) {
  const filtered = nodes.get().filter(node => node.label.toLowerCase().includes(query.toLowerCase()));
  suggestions.innerHTML = "";
  filtered.forEach(node => {
    const li = document.createElement("li");
    li.textContent = node.label;
    li.style.padding = "6px";
    li.style.cursor = "pointer";
    li.addEventListener("click", () => {
      searchBox.value = node.label;
      focusNode(node.id);
      suggestions.style.display = "none";
    });
    suggestions.appendChild(li);
  });
  suggestions.style.display = filtered.length ? "block" : "none";
}

searchBox.addEventListener("input", () => {
  const query = searchBox.value.trim();
  if (query.length > 0) {
    showSuggestions(query);
  } else {
    suggestions.style.display = "none";
    network.unselectAll();
  }
});

clearBtn.addEventListener("click", () => {
  searchBox.value = "";
  suggestions.style.display = "none";
  network.unselectAll();
  network.moveTo({
    position: {x: 0, y: 0},
    scale: 1,
    animation: {
      duration: 1000,
      easingFunction: "easeInOutQuad"
    }
  });
});

document.addEventListener("click", event => {
  if (!searchBox.contains(event.target) && !suggestions.contains(event.target)) {
    suggestions.style.display = "none";
  }
});

             window.onload = function () {
  const revealOrder = ['wb', 'epist', 'antro', 'teoria_liter', 'filo_leng',
    'narrato', 'semio', 'soc', 'rep', 'narrativa', 'construct', 'ww',
    'cultural', 'philosophy', 'transmedia', 'sistemas', 'cibernetica', 
    'ia', 'ic', 'dp', 'medios', 'mundos', 'comunicacion', 
    'design', 'sistemico', 'transicion', 'regen', 'anticip', 'ficcion',
    'spec', 'futuro', 'narr_cambio', 'meta', 'foresight', 'innov',
    'teoria_cambio', 'inn_emp', 'inn_soc'
  ];

  function runAnimation() {
    // Hide all in the order list
    const hidden = revealOrder.map(id => {
      const node = nodes.get(id);
      return { ...node, hidden: true };
    });
    nodes.update(hidden);

    // Reveal one by one
    revealOrder.forEach((id, i) => {
      setTimeout(() => {
        nodes.update({ id: id, hidden: false });
      }, i * 300); // Adjust delay per node here
    });
  }

  // Initial animation on load
  runAnimation();

  // If button exists, attach click listener
  const button = document.getElementById("revealBtn");
  if (button) {
    button.addEventListener("click", runAnimation);
  }
};
